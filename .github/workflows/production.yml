name: Production Deployment

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: self-hosted
    environment: production
    env:
      PORT: ${{ secrets.PORT }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      NODE_ENV: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Pull latest code
        run: |
          set -e
          cd /home/sushant/app/prod/MyDrive
          git pull origin main
      - name: Install
        run: |
          set -e
          cd /home/sushant/app/prod/MyDrive/server
          npm ci
      - name: Restart backend service
        run: |
          set -e
          sudo systemctl restart mydrive-backend

  deploy-frontend:
    needs: deploy-backend
    runs-on: self-hosted
    environment: production
    env:
      REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Pull latest code
        run: |
          set -e
          cd /home/sushant/app/prod/MyDrive
          git pull origin main

      - name: Install & build
        run: |
          set -e
          cd /home/sushant/app/prod/MyDrive/client
          export REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
          export REACT_APP_CHUNK_SIZE=1048576
          export REACT_APP_MAX_RETRIES=5
          export REACT_APP_SHOW_DEV_BANNER=false
          npm ci
          npm run build

      - name: Deploy to Nginx directory
        run: |
          set -e
          sudo rm -rf /var/www/mydrive-frontend/*
          sudo cp -r /home/sushant/app/prod/MyDrive/client/build/* /var/www/mydrive-frontend/
          sudo chown -R www-data:www-data /var/www/mydrive-frontend
          sudo systemctl reload nginx

  deploy-image-worker:
    needs: deploy-frontend # ← waits for frontend
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Pull latest changes
        run: |
          set -e
          cd /home/sushant/app/prod/MyDrive
          git fetch origin
          git reset --hard origin/main
      - name: Compile CUDA kernels
        run: |
          set -e
          cd /home/sushant/app/prod/MyDrive/worker/image-worker
          nvcc -c -arch=sm_75 \
            -Xcompiler -fPIC \
            cuda/image_ops.cu -o cuda/image_ops.o
      - name: Create CUDA static library
        run: |
          set -e
          cd /home/sushant/app/prod/MyDrive/worker/image-worker
          ar rcs cuda/libimage_ops.a cuda/image_ops.o
      - name: Build worker binary
        run: |
          set -e
          cd /home/sushant/app/prod/MyDrive/worker/image-worker
          export CGO_ENABLED=1
          export CGO_CFLAGS="-I$(pwd)/cuda"
          export CGO_LDFLAGS="$(pwd)/cuda/libimage_ops.a -lcuda -lcudart -lstdc++"
          go build -o image-worker
          [ -f image-worker ] || (echo "Build failed: no image-worker binary" && exit 1)
      - name: Install new binary
        run: |
          set -e
          sudo install -m 755 \
            /home/sushant/app/prod/MyDrive/worker/image-worker/image-worker \
            /usr/local/bin/image-worker
      - name: Restart worker service
        run: |
          sudo systemctl daemon-reload
          sudo systemctl restart image-worker  
          sudo systemctl status image-worker --no-pager

  deploy-zipping-worker:
    needs: deploy-frontend
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Pull latest changes
        run: |
          set -e
          cd /home/sushant/app/prod/MyDrive
          git fetch origin
          git reset --hard origin/main
      - name: Build worker binary
        run: |
          set -e
          cd /home/sushant/app/prod/MyDrive/worker/zipping-worker
          go build -o zipping-worker
          [ -f zipping-worker ] || (echo "Build failed: no zipping-worker binary" && exit 1)
      - name: Install new binary
        run: |
          set -e
          sudo install -m 755 \
            /home/sushant/app/prod/MyDrive/worker/zipping-worker/zipping-worker \
            /usr/local/bin/zipping-worker
      - name: Restart worker service
        run: |
          sudo systemctl daemon-reload
          sudo systemctl restart zipping-worker
          sudo systemctl status zipping-worker --no-pager
